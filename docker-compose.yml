services:
  db:
    image: postgres:18.3
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - 8081:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: 
      - 6380:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - 8001:8000
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  
  celery-worker:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=info"]

  celery-beat:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "beat", "--loglevel=info", "--schedule=/app/celery-state/celerybeat-schedule"]
    
volumes:
  pg_data: