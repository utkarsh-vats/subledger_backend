name: CI - Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18.3
                env:
                    POSTGRES_DB: test_subledger
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d test_subledger"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 10

            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 10

        env:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
            POSTGRES_DB: test_subledger
            POSTGRES_HOST: localhost
            POSTGRES_PORT: 5432
            SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
            ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRE_MINUTES: 60
            REDIS_URL: redis://localhost:6379/0
            ADMIN_EMAIL: test-admin@subledger.local
            ADMIN_PASSWORD_HASH: ${{ secrets.CI_ADMIN_PASSWORD_HASH }}
            TEST_DATABASE_URL: postgresql+psycopg://postgres:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/test_subledger

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.14"
                  cache: "pip"
                  cache-dependency-path: "pyproject.toml"

            - name: Get setuptools and wheels
              run: python -m pip install --upgrade pip setuptools wheel

            - name: Install dependencies
              run: pip install -e ".[dev]"

            - name: Run tests
              run: pytest -v --strict-markers --strict-config
